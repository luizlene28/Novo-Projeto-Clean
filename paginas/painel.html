<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --accent: #00E5FF; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: transparent; color: white; overflow: hidden; }
        .main-block { background: rgba(30, 16, 69, 0.9); border-radius: 20px; padding: 20px; border: 1px solid rgba(155, 109, 255, 0.4); text-align: center; }
        .circle { width: 110px; height: 110px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        .circle b { font-size: 1.8rem; color: #fff; }
        .circle small { font-size: 0.6rem; color: #b3a5d9; text-transform: uppercase; }
        .section-title { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin: 15px 0 5px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); text-align: left; }
        .info-row { margin: 8px 0; text-align: left; display: flex; flex-direction: column; }
        .label { color: #b3a5d9; font-size: 0.65rem; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="main-block">
        <div class="circle"><b id="ram-p">0%</b><small>RAM em uso</small></div>
        
        <div class="section-title">Memória RAM</div>
        <div class="info-row"><span class="label">Disponível:</span><span id="ram-l" class="value">0 MB</span></div>
        <div class="info-row"><span class="label">Espaço Usado:</span><span id="ram-t" class="value">0.0 GB</span></div>

        <div class="section-title">Armazenamento Interno</div>
        <div class="info-row"><span class="label">Ocupado (MB / Decimal):</span><span id="int-u" class="value">0 MB / 0.0 GB</span></div>
        <div class="info-row"><span class="label">Livre no Celular:</span><span id="int-l" class="value">0.0 GB</span></div>
    </div>

    <script>
    function atualizarPainel() {
        var d = window.AppInventor.getWebViewString();
        if (d && d.includes("PAINEL,")) {
            var p = d.split(',');
            // p[1]=% RAM, p[2]=RAM Livre, p[3]=RAM Total, p[4]=Espaço Total, p[5]=Espaço Livre
            
            document.getElementById('ram-p').innerText = Math.round(parseFloat(p[1] || 0)) + "%";
            document.getElementById('ram-l').innerText = (p[2] || 0) + " MB";
            document.getElementById('ram-t').innerText = (parseFloat(p[3] || 0)/1024).toFixed(1) + " GB";
            
            var total = parseFloat(p[4] || 0);
            var livre = parseFloat(p[5] || 0);
            var uso = total - livre;

            // Ajuste de escala para GB
            var div = (total > 1000000) ? 1073741824 : 1;
            
            document.getElementById('int-u').innerText = (uso/div).toFixed(1) + " GB Ocupado";
            document.getElementById('int-l').innerText = (livre/div).toFixed(1) + " GB Disponível";
        }
    }
    setInterval(atualizarPainel, 1000);
</script>
</body>
</html>
