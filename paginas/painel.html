<!DOCTYPE html>
<html>
<body style="background: #1a1035; color: white; font-family: sans-serif; padding: 20px;">
    <h3 style="color: #00E5FF;">📡 Scanner de Dados</h3>
    <p>Status: <span id="status" style="color: yellow;">Aguardando sinal do App...</span></p>
    <hr>
    <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;">
        <p><b>Última mensagem recebida:</b></p>
        <code id="raw-data" style="word-break: break-all; color: #76FF03;">(Nenhum dado chegou ainda)</code>
    </div>

    <script>
        window.addEventListener('message', function(event) {
            var d = event.data;
            document.getElementById('status').innerText = "Conectado!";
            document.getElementById('status').style.color = "#76FF03";
            document.getElementById('raw-data').innerText = d;
        });
    </script>
</body>
</html>
