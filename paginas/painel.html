<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #6C3CE1; --accent: #00E5FF; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: transparent; color: white; overflow: hidden; }
        .main-block { background: rgba(30, 16, 69, 0.85); border-radius: 20px; padding: 15px; border: 1px solid rgba(155, 109, 255, 0.4); backdrop-filter: blur(10px); }
        .circle { width: 105px; height: 105px; border: 4px solid var(--accent); border-radius: 50%; margin: 0 auto 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        .circle b { font-size: 1.7rem; }
        .circle small { font-size: 0.6rem; color: #b3a5d9; }
        .section-title { font-size: 0.7rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin: 8px 0 4px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); }
        .info-row { margin: 6px 0; display: flex; flex-direction: column; }
        .label { color: #b3a5d9; font-size: 0.6rem; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="main-block">
        <div class="circle"><b id="txt-ram-perc">0%</b><small>RAM EM USO</small></div>
        
        <div class="section-title">Memória RAM</div>
        <div class="info-row"><span class="label">Disponível agora:</span><span id="txt-ram-livre" class="value">0 MB</span></div>
        <div class="info-row"><span class="label">Total do Sistema:</span><span id="txt-ram-total" class="value">0.0 GB</span></div>

        <div class="section-title">Armazenamento Interno</div>
        <div class="info-row"><span class="label">Ocupado (MB / Decimal):</span><span id="txt-int-uso" class="value">0 MB / 0.0 GB</span></div>
        <div class="info-row"><span class="label">Espaço Livre no Celular:</span><span id="txt-int-livre" class="value">0.0 GB Disponível</span></div>
    </div>

    <script>
        window.addEventListener('message', function(event) {
            var d = event.data;
            if (d && d.includes(',')) {
                var p = d.split(',');
                if (p[0] === "PAINEL") {
                    // RAM: p[1]=%, p[2]=LivreMB, p[3]=TotalMB
                    document.getElementById('txt-ram-perc').innerText = Math.round(p[1]) + "%";
                    document.getElementById('txt-ram-livre').innerText = p[2] + " MB";
                    document.getElementById('txt-ram-total').innerText = (parseFloat(p[3])/1024).toFixed(1) + " GB";
                    
                    // ARMAZENAMENTO: p[4]=LivreBytes (Inverso), p[5]=TotalBytes
                    var livreBytes = parseFloat(p[4]) || 0;
                    var totalBytes = parseFloat(p[5]) || 0;
                    var usoBytes = totalBytes - livreBytes;
                    
                    var totalGB = (totalBytes / 1073741824).toFixed(1);
                    var usoGB = (usoBytes / 1073741824).toFixed(1);
                    var livreGB = (livreBytes / 1073741824).toFixed(1);
                    var usoMB = Math.round(usoBytes / 1048576);

                    document.getElementById('txt-int-uso').innerText = usoMB + " MB / " + usoGB + " GB";
                    document.getElementById('txt-int-livre').innerText = livreGB + " GB Disponível";
                }
            }
        });
    </script>
</body>
</html>
