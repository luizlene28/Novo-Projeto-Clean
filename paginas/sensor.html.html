<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset e base para o estilo 3D app store */
        :root {
            --primary: #6C3CE1;
            --accent1: #FF3D71;
            --accent2: #FFB347;
            --accent3: #00E5FF;
            --accent4: #76FF03;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 15px;
            background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, #0a0618 40%, #05030f 100%) !important;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo com orbes decorativas */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 15% 25%, rgba(108, 60, 225, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 75% 60%, rgba(255, 61, 113, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 229, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(255, 179, 71, 0.07) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* Cubo 3D no canto superior esquerdo */
        .cube-wrapper {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            pointer-events: none;
            filter: drop-shadow(0 8px 16px rgba(108, 60, 225, 0.6)) drop-shadow(0 0 20px rgba(155, 109, 255, 0.4));
            animation: cubeFloat 4s ease-in-out infinite;
        }

        @keyframes cubeFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
            60% {
                transform: translateY(-2px);
            }
            85% {
                transform: translateY(-4px);
            }
        }

        .cube-scene {
            width: 45px;
            height: 45px;
            perspective: 400px;
            perspective-origin: 50% 50%;
        }

        .cube-3d {
            width: 45px;
            height: 45px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 10s cubic-bezier(0.45, 0.05, 0.35, 0.95) infinite;
        }

        @keyframes rotateCube {
            0% {
                transform: rotateY(0deg) rotateX(15deg) rotateZ(0deg);
            }
            20% {
                transform: rotateY(120deg) rotateX(20deg) rotateZ(3deg);
            }
            40% {
                transform: rotateY(240deg) rotateX(10deg) rotateZ(-3deg);
            }
            55% {
                transform: rotateY(300deg) rotateX(22deg) rotateZ(5deg);
            }
            70% {
                transform: rotateY(380deg) rotateX(14deg) rotateZ(-2deg);
            }
            85% {
                transform: rotateY(460deg) rotateX(18deg) rotateZ(1deg);
            }
            100% {
                transform: rotateY(720deg) rotateX(15deg) rotateZ(0deg);
            }
        }

        .face {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            backface-visibility: visible;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.2), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            user-select: none;
        }

        .face.front {
            background: linear-gradient(145deg, #FF3D71, #e0305e);
            transform: translateZ(22.5px);
        }
        .face.back {
            background: linear-gradient(145deg, #00E5FF, #00b8d4);
            transform: rotateY(180deg) translateZ(22.5px);
        }
        .face.right {
            background: linear-gradient(145deg, #FFB347, #ff9800);
            transform: rotateY(90deg) translateZ(22.5px);
        }
        .face.left {
            background: linear-gradient(145deg, #9B6DFF, #7c4dff);
            transform: rotateY(-90deg) translateZ(22.5px);
        }
        .face.top {
            background: linear-gradient(145deg, #76FF03, #64dd17);
            transform: rotateX(90deg) translateZ(22.5px);
        }
        .face.bottom {
            background: linear-gradient(145deg, #FF6EC7, #f5009b);
            transform: rotateX(-90deg) translateZ(22.5px);
        }

        /* Glow extra ao redor do cubo */
        .cube-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(155, 109, 255, 0.6) 0%, transparent 70%);
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.4);
                opacity: 1;
            }
        }

        /* Container da lista com visual 3D */
        #lista {
            position: relative;
            z-index: 10;
            background: linear-gradient(145deg, #1e1045 0%, #281558 30%, #1a0f3c 60%, #12082e 100%);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(155, 109, 255, 0.25),
                0 0 40px rgba(108, 60, 225, 0.3);
            border: 2px solid rgba(155, 109, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-top: 10px;
        }

        /* Cartões sensores estilo app store */
        .s-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 5px solid transparent;
            border-image: linear-gradient(180deg, var(--accent1), var(--accent3)) 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: var(--text-light);
        }

        .s-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(108, 60, 225, 0.4);
            border-image: linear-gradient(180deg, var(--accent2), var(--accent4)) 1;
        }

        .s-name {
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .s-name::before {
            content: "⚡";
            font-size: 1.2rem;
        }

        .s-val {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, #ffffff, #c9b8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 10px rgba(108, 60, 225, 0.5);
        }

        /* Ajuste para telas pequenas */
        @media (max-width: 480px) {
            .cube-wrapper {
                transform: scale(0.8);
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Cubo 3D com LC e caracteres do projeto -->
    <div class="cube-wrapper">
        <div class="cube-scene">
            <div class="cube-3d">
                <div class="face front">L</div>
                <div class="face back">C</div>
                <div class="face right">S</div>
                <div class="face left">M</div>
                <div class="face top">✦</div>
                <div class="face bottom">P</div>
            </div>
        </div>
    </div>

    <!-- Conteúdo original mantido intacto -->
    <div id="lista">
        <div class="s-card"><span class="s-name">Acelerômetro</span><span class="s-val" id="s-acc">---</span></div>
        <div class="s-card"><span class="s-name">Giroscópio</span><span class="s-val" id="s-gyr">---</span></div>
        <div class="s-card"><span class="s-name">Proximidade</span><span class="s-val" id="s-prox">---</span></div>
        <div class="s-card"><span class="s-name">Barômetro</span><span class="s-val" id="s-bar">---</span></div>
        <div class="s-card"><span class="s-name">Luz Ambiente</span><span class="s-val" id="s-lux">---</span></div>
    </div>

    <script>
        function atualizarSensor(id, valor) {
            const el = document.getElementById('s-' + id);
            if (el) el.innerText = valor;
        }
    </script>
</body>
</html>
