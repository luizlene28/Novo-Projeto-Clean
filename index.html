<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Severino Master Clean PRO</title>
    <style>
        :root {
            --primary: #6C3CE1; 
            --primary-glow: #9B6DFF; 
            --bg: #0f0a1a;
            --text-white: #ffffff; 
            --accent3: #00E5FF;
        }
        * { box-sizing: border-box; }
        
        body {
            margin: 0; 
            padding: 0;
            font-family: sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, #05030f 100%);
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        .app-header {
            background: linear-gradient(135deg, #1e1045 0%, #12082e 100%);
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center;
            border-bottom: 2px solid rgba(155, 109, 255, 0.4);
            height: 70px;
        }

        .cube-scene { width: 45px; height: 45px; perspective: 400px; margin-right: 15px; }
        .cube-3d {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            animation: rot 10s linear infinite;
        }
        .cube-face {
            position: absolute; width: 45px; height: 45px; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            border: 1px solid white; color: white; border-radius: 5px;
            font-size: 18px;
        }
        .front { background: #FF3D71; transform: translateZ(22px); }
        .back { background: #00E5FF; transform: rotateY(180deg) translateZ(22px); }
        .right { background: #FFB347; transform: rotateY(90deg) translateZ(22px); }
        .left { background: #9B6DFF; transform: rotateY(-90deg) translateZ(22px); }
        .top { background: #76FF03; transform: rotateX(90deg) translateZ(22px); }
        .bottom { background: #FF6EC7; transform: rotateX(-90deg) translateZ(22px); }

        @keyframes rot { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .tabs { 
            display: flex; 
            background: #1a1035; 
            padding: 8px; 
            gap: 5px;
            height: 55px;
        }
        .tab {
            flex: 1; text-align: center; padding: 10px 5px; color: #8a7ab5;
            cursor: pointer; border-radius: 8px; font-size: 0.75rem;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .tab.active { background: #6C3CE1; color: white; box-shadow: 0 0 15px rgba(108, 60, 225, 0.5); }

        /* AJUSTE DO CONTAINER: Agora ele ocupa todo o resto da tela */
        .iframe-container { 
            margin: 0; 
            border: none; 
            height: calc(100vh - 125px); 
            width: 100vw;
            overflow: hidden; 
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="cube-scene">
            <div class="cube-3d">
                <div class="cube-face front">L</div><div class="cube-face back">C</div>
                <div class="cube-face right">S</div><div class="cube-face left">M</div>
                <div class="cube-face top">✦</div><div class="cube-face bottom">P</div>
            </div>
        </div>
        <div><b>Severino Master Clean</b><br><small id="sub">PAINEL DE CONTROLE</small></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="mudar(this, 'paginas/painel.html', 'PAINEL')">PAINEL</div>
        <div class="tab" onclick="mudar(this, 'paginas/sensor.html', 'SENSORES')">SENSORES</div>
        <div class="tab" onclick="mudar(this, 'paginas/limpeza.html', 'LIMPEZA')">LIMPEZA</div>
    </div>

    <div class="iframe-container">
        <iframe id="frame" src="paginas/painel.html"></iframe>
    </div>

    <script>
        function receiveData(data) {
    // Esse comando quebra a linha de texto nas vírgulas
    var dados = data.split(",");

    // Aqui a mágica acontece: ele coloca cada valor no seu lugar
    if (dados.length >= 5) {
        document.getElementById("nivel").innerHTML = dados[0] + "%";
        document.getElementById("status").innerHTML = dados[1];
        document.getElementById("temp").innerHTML = dados[2] + "°C";
        document.getElementById("modelo").innerHTML = dados[3];
        document.getElementById("versao").innerHTML = dados[4];
    }
}
    </script>
</body>
</html>
